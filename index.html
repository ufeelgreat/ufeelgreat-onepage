<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gaël Tréfeu — Chef de production audiovisuelle & coordination d'équipes. Montréal." />
  <title>Gaël Tréfeu — Production & Coordination</title>

  <!-- Typographie -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================================================
       NAVIGATION PILL (sticky)
  ============================================================ -->
  <nav id="nav-pill" aria-label="Navigation principale">
    <ul>
      <li><a href="#hero">Accueil</a></li>
      <li><a href="#vision">Vision</a></li>
      <li><a href="#expertise">Expertise</a></li>
      <li><a href="#softskills">Profil</a></li>
      <li><a href="#testimonials">Avis</a></li>
      <li><a href="#timeline">Parcours</a></li>
      <li><a href="#loves">Ce que j'aime</a></li>
      <li><a href="#portfolio">Portfolio</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- ============================================================
       SECTION 1 — HERO
  ============================================================ -->
  <section id="hero" class="section section--hero">
    <div class="container">
      <p class="hero__badge" data-content="hero.badge"></p>
      <h1 class="hero__title" data-content="hero.title"></h1>
      <p class="hero__description" data-content="hero.description"></p>
      <ul class="hero__highlights" data-content="hero.highlights" role="list"></ul>
    </div>
  </section>

  <!-- ============================================================
       SECTION 2 — VISION
  ============================================================ -->
  <section id="vision" class="section section--vision reveal">
    <div class="container">
      <p class="vision__intro" data-content="vision.intro"></p>
      <div class="vision__body" data-content="vision.body"></div>
    </div>
  </section>

  <!-- ============================================================
       SECTION 3 — EXPERTISE & MÉTHODOLOGIE
  ============================================================ -->
  <section id="expertise" class="section section--expertise reveal">
    <div class="container">
      <h2 class="section__title">Expertise & Méthodologie</h2>
      <p class="section__intro" data-content="expertise.intro"></p>

      <!-- Filtres -->
      <div class="expertise__filters" role="group" aria-label="Filtrer par catégorie" data-content="expertise.filters"></div>

      <!-- Grille de cartes -->
      <div class="expertise__grid" data-content="expertise.cards"></div>
    </div>
  </section>

  <!-- ============================================================
       SECTION 4 — SOFT SKILLS & MAÎTRISE TECHNIQUE
  ============================================================ -->
  <section id="softskills" class="section section--softskills reveal">
    <div class="container">
      <h2 class="section__title">Profil humain</h2>
      <p class="section__intro" data-content="softSkills.intro"></p>
      <ul class="softskills__list" data-content="softSkills.items" role="list"></ul>
    </div>
  </section>

  <!-- ============================================================
       SECTION 5 — TÉMOIGNAGES
  ============================================================ -->
  <section id="testimonials" class="section section--testimonials reveal">
    <div class="container">
      <h2 class="section__title">Ce qu'on dit de moi</h2>
      <div class="testimonials__grid" data-content="testimonials"></div>
    </div>
  </section>

  <!-- ============================================================
       SECTION 6 — TIMELINE
  ============================================================ -->
  <section id="timeline" class="section section--timeline reveal">
    <div class="container">
      <h2 class="section__title">Parcours</h2>
      <ol class="timeline__list" data-content="timeline" role="list"></ol>
    </div>
  </section>

  <!-- ============================================================
       SECTION 7 — CE QUE J'AIME
  ============================================================ -->
  <section id="loves" class="section section--loves reveal">
    <div class="container">
      <h2 class="section__title">Ce que j'aime dans ce métier</h2>
      <p class="section__intro" data-content="loves.intro"></p>
      <ul class="loves__list" data-content="loves.items" role="list"></ul>
    </div>
  </section>

  <!-- ============================================================
       SECTION 8 — PORTFOLIO
  ============================================================ -->
  <section id="portfolio" class="section section--portfolio reveal">
    <div class="container">
      <h2 class="section__title">Portfolio</h2>
      <p class="section__intro" data-content="portfolio.intro"></p>
      <div class="portfolio__grid" data-content="portfolio.projects"></div>
    </div>
  </section>

  <!-- ============================================================
       SECTION 9 — CONTACT
  ============================================================ -->
  <section id="contact" class="section section--contact">
    <div class="container">
      <p class="contact__intro" data-content="contact.intro"></p>
      <p class="contact__cta" data-content="contact.cta"></p>
      <p class="contact__availability" data-content="contact.availability"></p>
      <ul class="contact__links" data-content="contact.links" role="list"></ul>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
